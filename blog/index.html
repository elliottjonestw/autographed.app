<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog · autographed.app</title>
  <meta name="description" content="Guides, tips, and updates for autograph and memorabilia collectors.">
  <style>
    :root {
      --bg: #f0f0f5;
      --surface: #ffffff;
      --card: #ffffff;
      --card-hover: #f8f8fc;
      --border: #dcdce8;
      --border-light: #c8c8da;
      --gold: #c9a435;
      --text: #18182a;
      --sub: #70708a;
      --r: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 19px; font-weight: 800; letter-spacing: -0.6px; color: var(--gold); text-decoration: none; }
    .logo span { color: var(--text); font-weight: 400; }
    .nav-links { display: flex; gap: 24px; }
    .nav-link { color: var(--sub); font-size: 14px; font-weight: 500; text-decoration: none; transition: color .15s; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--text); font-weight: 600; }
    .nav-cta { background: var(--gold); color: #000; font-weight: 700; font-size: 14px; padding: 8px 18px; border-radius: 8px; text-decoration: none; transition: opacity .15s; }
    .nav-cta:hover { opacity: .85; }

    .page-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 56px 24px 48px;
      text-align: center;
    }
    .page-header h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .page-header p { font-size: 17px; color: var(--sub); max-width: 440px; margin: 0 auto; }

    .posts-section { padding: 56px 24px 80px; flex: 1; }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .post-card {
      display: flex;
      flex-direction: column;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      text-decoration: none;
      color: inherit;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .post-card:hover { background: var(--card-hover); border-color: var(--border-light); transform: translateY(-2px); }

    .post-date {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .post-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; line-height: 1.3; margin-bottom: 10px; }
    .post-desc { font-size: 14px; color: var(--sub); line-height: 1.6; flex: 1; margin-bottom: 20px; }
    .post-read { font-size: 13px; font-weight: 600; color: var(--gold); }

    .posts-empty { grid-column: 1 / -1; text-align: center; color: var(--sub); padding: 60px 0; font-size: 15px; }

    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 24px; text-align: center; font-size: 13px; color: var(--sub); }
    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .posts-grid { grid-template-columns: 1fr; }
      .page-header { padding: 40px 20px 36px; }
      .posts-section { padding: 40px 20px 60px; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="../index.html">autographed<span>.app</span></a>
  <a class="nav-cta" href="../dashboard.html">Dashboard →</a>
</nav>

<div class="page-header">
  <h1>Blog</h1>
  <p>The official autographed.app blog!</p>
</div>

<div class="posts-section">
  <div class="posts-grid" id="posts-grid">
    <p class="posts-empty">Loading…</p>
  </div>
</div>

<footer>
  <a href="../index.html">Home</a> · <a href="../dashboard.html">Dashboard</a> · <a href="index.html">Blog</a>
</footer>

<script>
  async function loadPosts() {
    const grid = document.getElementById('posts-grid');
    try {
      const resp = await fetch('posts.json');
      if (!resp.ok) throw new Error('fetch failed');
      const posts = await resp.json();
      if (!posts.length) {
        grid.innerHTML = '<p class="posts-empty">No posts yet — check back soon.</p>';
        return;
      }
      posts.sort((a, b) => new Date(b.date) - new Date(a.date));
      grid.innerHTML = posts.map(p => {
        const date = new Date(p.date + 'T12:00:00').toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
        return `<a class="post-card" href="${p.file}">
          <div class="post-date">${date}</div>
          <div class="post-title">${p.title}</div>
          <div class="post-desc">${p.description}</div>
          <span class="post-read">Read article →</span>
        </a>`;
      }).join('');
    } catch {
      grid.innerHTML = '<p class="posts-empty">Could not load posts — please try again later.</p>';
    }
  }
  loadPosts();
</script>

</body>
</html>
